<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/png" href="assets/KIbabii-Logo.png">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="main">
        <div class="logo">
            <img src="assets/KIbabii-Logo.png" alt="logo" width="100%">

        </div>
        <div class="card">
            <h2>Create Account</h2>
            <form enctype="multipart">
                <div class="form-group">
                    <label for="txtfname">Enter First Name:</label>
                    <input type="text" name="name" id="txtfname" placeholder="Enter your first name" autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label for="txtlname">Enter Last Name:</label>
                    <input type="text" name="name" id="txtlname" placeholder="Enter your last name" autocomplete="family-name">
                </div>
                <div class="form-group">
                    <label for="txtemail">Enter Email:</label>
                    <input type="email" name="email" id="txtemail" placeholder="Enter your email" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="txtpassword">Enter Password:</label>
                    <input type="password" name="password" id="txtpassword" placeholder="*********" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="txtconpass">Confirm Password:</label>
                    <input type="password" name="password" id="txtconpass" placeholder="*********" autocomplete="new-password">
                </div>
                <div>
                    <button type="button" class="btn-primary" id="submitBtn">Create Account</button>
                    <button type="button" class="btn-register" id="register">
                        <a href="index.html">Already have an account? Login</a>
                    </button>
                </div>
            </form>

        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
<script src="js/config.js"></script>
<script src="js/register.js"></script>
</body>
</html>
