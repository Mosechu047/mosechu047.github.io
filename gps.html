<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin GPS</title>
  <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" type="image/png" href="assets/KIbabii-Logo.png">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/KIbabii-Logo.png" alt="logo" width="10%">
  </div>
  <div class="user">
    <label id="lblusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="#">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="students.html">Students</a>
    <a href="admin.html">Admin</a>
    <a href="#">GPS</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Active</h3><p class="stat-number">350</p></div>
    <div class="card"><h3>Past</h3><p class="stat-number">25</p></div>

  </div>

 

  <!-- Form -->
  <div class="card">
    <h2>Add New GPS Location</h2>
    <form>
      <div class="form-group">
        <label>Location Name</label>
        <input type="text" placeholder="Enter location name">
      </div>
      <div class="form-group">
        <label>Latitude</label>
        <input type="text" placeholder="Enter latitude">
      </div>
      <div class="form-group">
        <label>Longitude</label>
        <input type="text" placeholder="Enter longitude">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select><option>Active</option><option>Suspended</option></select>
      </div>
      <button type="submit" class="addBtn">Add Student</button>
    </form>
  </div>
  

   <!-- Table -->
  <div class="card">
    <h2>Active GPS Locations</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>ID</th><th>Name</th><th>Program</th><th>Status</th></tr>
        </thead>
        <tbody>
          <tr><td>2026001</td><td>John Doe</td><td>IT</td><td>Active</td></tr>
          <tr><td>2026002</td><td>Jane Smith</td><td>CS</td><td>Active</td></tr>
          <tr><td>2026003</td><td>Michael Brown</td><td>SE</td><td>Suspended</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Elimu Admin Panel</p>
</footer>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>

<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });

  let lblusername = document.getElementById("lblusername");
  auth.onAuthStateChanged((user) => {
    if (user) {
      if(user){
        lblusername.innerHTML = user.email;
      }
    } else {
      window.location.href = "index.html";
    }
  });

</script>

</body>
</html>
