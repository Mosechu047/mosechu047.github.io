<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="icon" type="image/png" href="assets/KIbabii-Logo.png">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    
    <div class="main">
        <div class="logo">
            <img src="assets/KIbabii-Logo.png" alt="logo" width="100%">

        </div>
        <div class="card">
            <h2>Reset Your Password</h2>
            <p>
                A password reset link will be sent to your email address. Please enter your email below to receive the reset instructions.
            </p>
            <form enctype="multipart">
                <div class="form-group">
                    <label for="txtemail">Enter Email:</label>
                    <input type="email" name="email" id="txtemail" placeholder="Enter your email" autocomplete="email">
                </div>
                
                <div>
                    <button type="button" class="btn-primary" id="resetBtn">Send Reset Link</button>
                    <button type="button" class="btn-register" id="login">
                        <a href="index.html">Back to Login</a>
                    </button>
                </div>
            </form>

        </div>
    </div>
        <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebasedatabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/reset.js"></script>

</body>
</html>
