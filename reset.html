<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="main">
        <div class="logo">
            <img src="assets/KIbabii-Logo.png" alt="logo" width="100%">

        </div>
        <div class="card">
            <h2>Reset Your Password</h2>
            <p>
                A password reset link will be sent to your email address. Please enter your email below to receive the reset instructions.
            </p>
            <form enctype="multipart">
                <div class="form-group">
                    <label for="username">Enter Email:</label>
                    <input type="email" name="email" id="username" placeholder="Enter your email">
                </div>
                
                <div>
                    <button class="btn-primary" id="submit">Send Reset Link</button>
                    <button class="btn-register" id="login">
                        <a href="index.html">Back to Login</a>
                    </button>
                </div>
            </form>

        </div>
    </div>
</body>
</html>
