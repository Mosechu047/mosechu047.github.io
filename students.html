<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Student</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="icon" type="image/png" href="assets/KIbabii-Logo.png">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <img src="assets/KIbabii-Logo.png" alt="logo" width="10%">
  </div>
  <div class="user">
    <label id="lblusername">username</label>
  </div>
</div>

<!-- NAVIGATION -->
<header class="header">
  <button class="menu-toggle">☰</button>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="#">Students</a>
    <a href="admin.html">Admin</a>
    <a href="gps.html">GPS</a>
    <a href="reports.html">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<!-- MAIN -->
<main class="container">

  <!-- Cards -->
  <div class="cards-grid">
    <div class="card"><h3>Students</h3><p class="stat-number">350</p></div>
    <div class="card"><h3>Total Students</h3><p class="stat-number">25</p></div>
    <div class="card"><h3>Absent past 30 Days</h3><p class="stat-number">18</p></div>
    <div class="card"><h3>Pending Approvals</h3><p class="stat-number">7</p></div>
  </div>

  <!-- Form -->
  <div class="card">
    <h2>Add Student</h2>
    <form>
      <div class="form-group">
        <label>First Name</label>
        <input id="txtfname" type="text" placeholder="Enter first name">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input id="txtlname" type="text" placeholder="Enter last name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="txtemail" type="email" placeholder="Enter email">
    
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="slstatus">
          <option>Active</option>
          <option>inactive</option></select>
      </div>
      <button id="btnAddstudent"  type="submit" class="btn-primary btnGreen">Add Student</button>
    </form>
  </div>

  <!-- Table -->
  <div class="card">
    <h2>Student List</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tablebody">
          <tr>
            <td>###</td>
            <td>###</td>
            <td>###</td>
            <td>
              <button class="btn-reject">Suspend</button>
              

            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Elimu Admin Panel</p>
</footer>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <script src="js/students.js"></script>

    

<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
    menuToggle.textContent = nav.classList.contains('active') ? "✖" : "☰";
  });

  let lblusername = document.getElementById("lblusername");
  auth.onAuthStateChanged((user) => {
    if (user) {
      if(user){
        lblusername.innerHTML = user.email;
      }
    } else {
      window.location.href = "index.html";
    }
  });

</script>

</body>
</html>
