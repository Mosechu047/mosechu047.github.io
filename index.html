<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance</title>
    <link rel="stylesheet" href="css/index.css">
    </script>
</head>
<body>

    <div class="main">
        <div class="logo">
            <img src="assets/KIbabii-Logo.png" alt="logo" width="100%">

        </div>
        <div class="card">
            <h2>Welcome to Kibabii University Attendance</h2>
            <form enctype="multipart">
                <div class="form-group">
                    <label for="username">Enter Username:</label>
                    <input type="text" name="name" id="username" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="password">Enter Password:</label>
                    <input type="password" name="password" id="password" placeholder="*********">
                </div>
                <div>
                    <button class="btn-primary" id="submit">Login</button>
                    <button class="btn-register" id="register">
                        <a href="register.html">Don't have an account? Register</a>
                    </button>
                    <button class="btn-forgot" id="forgotPassword">
                        <a href="reset.html">Forgot Password?</a>
                    </button>
                </div>
            </form>

        </div>
    </div>
</body>
</html>
